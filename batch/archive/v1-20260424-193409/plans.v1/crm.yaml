category: crm
label: CRM·이메일·멤버십
count: 30
prefix: B-CRM
out_dir: raw/batch/crm
size: "1024x1024"
quality: high

template: |
  {format} 포맷의 {industry} CRM 이메일/푸시 헤더 이미지.
  캠페인 목적: {purpose}. 핵심 오브제: {object}.
  배경/분위기: {scene}. 라이팅: {lighting}. 구도: {composition}.
  텍스트가 위에 얹힐 걸 고려해 주요 피사체는 화면 하단이나 좌/우 측면으로 배치,
  상단 1/3은 비워둔다. 브랜드 감성을 해치지 않는 은은하고 세련된 톤.

variables:
  format:
    - 2:1 이메일 헤더(1600x800 기준)
    - 16:9 앱 푸시/디스플레이 배너
    - 4:5 세로형 멤버십 카드뉴스
    - 1:1 인앱 모달 비주얼
  industry:
    - 호텔 멤버십
    - 패션 이커머스
    - 뷰티 브랜드
    - 카페 앱 리워드
    - 여행 OTA
    - F&B 배달 앱
  purpose:
    - 휴면 고객 재활성화
    - VIP 전용 프리세일 안내
    - 생일 축하 리워드
    - 재구매 리마인더
    - 신규 가입자 웰컴 시리즈
    - 구독 갱신 유도
  object:
    - 웰컴 카드와 리넨 패키징
    - 호텔 방 안의 웰컴티와 초콜릿
    - 포장된 선물 박스와 리본
    - 카페 컵과 적립 도장이 찍힌 카드
    - 비행기 창 밖 구름 + 탑승권
    - 반짝이는 회원 카드와 손가락 끝
  scene:
    - 아침 햇살이 드는 깔끔한 책상
    - 따뜻한 조명의 호텔 객실 코너
    - 미니멀 아이보리 배경 플랫레이
    - 창밖 비 내리는 카페 내부
  lighting:
    - 소프트 박스 균일광
    - 창가 자연광 역광
    - 노을빛 텅스텐 따뜻한 톤
    - 블루 아워 차분한 톤
  composition:
    - 중앙 하단 배치 + 상단 텍스트 공간
    - 좌측 2/3 장면 + 우측 여백
    - 탑뷰 플랫레이, 가운데 비움
    - 상단 1/3 오브제, 아래 큰 여백
