category: fashion
label: 패션·라이프스타일
count: 30
prefix: B-FASHION
out_dir: raw/batch/fashion
size: "1024x1024"
quality: high

template: |
  {format} 포맷의 패션 브랜드 캠페인 이미지. 시즌/라인: {season}.
  아이템: {item}. 모델: {model_desc}.
  장소: {location}. 구도/앵글: {composition}. 라이팅: {lighting}.
  텍스처·소재감이 선명하게 보이도록, 과도한 보정 없이 내추럴한 패션 화보 톤.
  카피·로고용 여백 확보.

variables:
  format:
    - 4:5 세로형 인스타그램 피드
    - 9:16 릴스 썸네일
    - 16:9 유튜브 썸네일
    - 1:1 카드뉴스 첫 장
  season:
    - 가을 시즌 미니멀 캠페인
    - 겨울 아우터 런칭
    - 초봄 트랜지션 룩
    - 여름 리조트 컬렉션
  item:
    - 오버사이즈 캐시미어 니트와 와이드 슬랙스
    - 더블 브레스트 트렌치코트와 앵클 부츠
    - 린넨 셔츠와 플리츠 스커트
    - 구조적 실루엣의 블레이저와 테일러드 팬츠
    - 리넨 슈트 + 로퍼
    - 글래머러스한 이브닝 원피스와 새틴 펌프스
  model_desc:
    - 20대 중반 한국 여성, 자연스러운 표정의 스트리트 스냅
    - 30대 초반 한국 남성, 차분한 정면 포트레이트
    - 얼굴 일부만 보이는 인물 크롭, 옷감 디테일 강조
    - 두 명이 함께 걷는 라이프스타일 씬
  location:
    - 은행나무 잎 깔린 서울 골목길
    - 한남동 부티크 쇼윈도 앞
    - 모노톤 스튜디오 회색 배경
    - 성수동 창고형 카페 인더스트리얼 공간
    - 제주 돌담 길, 바람 부는 오후
  composition:
    - 풀샷 인물 + 넓은 배경 여백
    - 니샷(허리 위) + 약간 로우앵글
    - 디테일 크롭(소매·단추·신발)
    - 역방향 뒷모습 샷
  lighting:
    - 노을빛 골든아워, 따뜻한 그림자
    - 흐린 날 디퓨즈 된 균일한 빛
    - 스튜디오 단일 광원, 강한 콘트라스트
    - 창가 자연광, 린넨 커튼의 부드러운 확산
