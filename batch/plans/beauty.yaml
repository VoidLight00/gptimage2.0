category: beauty
label: 뷰티·스킨케어
count: 50
prefix: B-BEAUTY
out_dir: raw/batch/beauty
size: "1024x1024"
quality: high

# 프롬프트 = template * variables 전체 조합.
# 조합 수가 count를 넘으면 앞에서 잘라서 사용.
# 한국어 그대로 GPT-Image-2에 전달된다.

template: |
  {format} 포맷 광고/콘텐츠 이미지. {brand_tone} 톤앤매너의 {product}.
  모델: {model_desc}. 배경: {background}.
  라이팅: {lighting}. 화면 구도: {composition}.
  화면 안에 제품이 명확히 보이고, 카피/로고 공간은 비워둔 상태로 구성.
  사진 스타일은 상업 광고 수준, 피부 톤과 질감이 자연스럽고 과도한 보정 없이 고급스럽게.

variables:
  format:
    - 4:5 세로형 인스타그램 피드
    - 9:16 릴스 썸네일
    - 16:9 유튜브 썸네일
    - 1:1 카드뉴스 첫 장
  brand_tone:
    - 프리미엄 미니멀
    - 클린 더마
    - 따뜻한 K-뷰티 감성
    - 바이오 사이언스 연구소 느낌
    - 비건 자연주의
  product:
    - 세라마이드 장벽 세럼 보틀
    - 히알루론산 저자극 토너 용기
    - 진정 라인 앰플 한 방울
    - 비타민C 브라이트닝 세럼
    - 무기자차 선크림 튜브
  model_desc:
    - 20대 후반 한국 여성, 민낯에 가까운 맑은 피부, 정면
    - 30대 초반 한국 여성, 자연광 아래 측면 크로즈업
    - 얼굴이 부분적으로 보이는 피부 디테일 컷, 손가락으로 제품 바르는 순간
    - 연출 없이 제품만 단독으로 놓인 스틸 라이프
  background:
    - 아이보리톤 세라믹 테이블, 뒤로 흐려진 아침 욕실
    - 매트한 베이지 브러시 타일과 리넨 수건
    - 모노톤 그레이 석재 표면 + 은은한 반사
    - 맑은 유리 샐러드볼에 물결치는 물 방울
    - 소프트한 파스텔 핑크 그라디언트 페이퍼 백드롭
  lighting:
    - 스튜디오 소프트 박스, 부드럽고 균일한 빛
    - 창가 자연광 + 얇은 레이스 커튼의 은은한 그림자
    - 위에서 45도 top-lit, 제품 하이라이트 강조
    - 노을빛 따뜻한 텅스텐
  composition:
    - 중앙 정렬 + 상단 3분의 1 카피 공간 확보
    - 황금비 우측 배치 + 좌측 여백
    - 로우앵글 제품 샷, 위쪽 하늘 공간 확보
    - 탑뷰 플랫레이, 주변에 소품 배치
