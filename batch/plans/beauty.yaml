category: beauty
label: 뷰티·스킨케어 광고
count: 30
prefix: B-BEAUTY
out_dir: raw/batch/beauty
size: "1024x1024"
quality: high

# 1024x1024 정사각 하이엔드 상업 광고.
# 프롬프트 = 전문 포토그래퍼 디렉션 포맷.
# 영어 전문용어 + 한국어 맥락 혼합 (gpt-image-2가 가장 안정적으로 해석).

template: |
  Subject (피사체): {product} centered on the frame, label facing camera, clean dewy surface detail.
  Context (촬영 맥락): Premium Korean beauty advertising for {target}, shot on medium-format digital with 90mm macro lens, f/4, ISO 100.
  Composition (구도): {composition}. 주인공 오브젝트가 화면의 55~65% 차지. {copy_zone}.
  Lighting (라이팅): {lighting}. Subtle catchlight on glass, soft falloff on background.
  Color palette (팔레트): {palette}. Desaturated mids, gentle highlights, skin-safe color profile.
  Surface & props (바닥·소품): {surface}.
  Mood & finishing (무드·후보정): editorial skincare campaign, clean retouching, no heavy dodge & burn, natural pore texture retained, no plastic skin, no HDR halo.
  Negative (금지): no text, no logo, no watermark, no extra hands, no duplicated bottles, no cartoonish gloss, no oversaturation, no lens distortion.

variables:
  product:
    - A {brand} ceramide barrier repair serum in a matte glass dropper bottle, amber tint
    - A {brand} hyaluronic low-irritation toner in a frosted cylindrical bottle with metallic cap
    - A {brand} retinol night ampoule in a slim amber apothecary bottle
    - A {brand} mineral physical sunscreen tube with soft ivory label
    - A {brand} vitamin-C brightening serum in a transparent glass bottle with dropper
    - A {brand} centella soothing essence in a pastel-mint frosted bottle
  brand:
    - minimalist derma
    - premium clean-science
    - modern K-beauty
  target:
    - 25-35 여성, 민감성 피부, 수분 장벽 관리 니즈
    - 30-40 여성, 탄력·광채, 나잇케어
    - 20대 후반 직장인, 효율 루틴, 출근 전 30초 스킨케어
  composition:
    - centered hero product with shallow depth of field and blurred spa background
    - 45-degree elevated hero shot with product slightly right of center
    - top-down flat-lay with product center, minimal satellite props around
    - product on a stepped tier with a single falling droplet frozen mid-air
  copy_zone:
    - 상단 1/3 여백 (카피/로고 공간)
    - 좌측 1/3 수직 여백 (세로 카피 공간)
    - 우측 45% 여백 (우측 정렬 카피)
    - 중앙 하단 3분의 1 여백 (제품명·태그라인)
  lighting:
    - soft north-window light, large silk diffuser camera-left, subtle silver bounce camera-right
    - controlled studio beauty dish top-lit with black flags side, rim light from back
    - overcast skylight simulation, giant scrim overhead, barely-there shadows
    - warm tungsten 3200K accent from upper back + neutral 5500K key front
  palette:
    - ivory, warm beige, rose quartz, soft champagne
    - pale pistachio, off-white, brushed silver, stone gray
    - dusty peach, linen white, caramel shadow
    - glacial mint, porcelain, pewter, sheer azure
  surface:
    - brushed matte ceramic slab with a single linen napkin fold
    - raw unpolished travertine with faint vein texture
    - seamless paper backdrop with subtle gradient, no edges visible
    - wet-look black slate with a single water droplet reflection
