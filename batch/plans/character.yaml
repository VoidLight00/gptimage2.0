category: character
label: 캐릭터 시트
count: 25
prefix: B-CHAR
out_dir: raw/batch/character
size: "1024x1024"
quality: high

# 캐릭터 디자인 / 턴어라운드 / 표정 시트.
# gpt-image-2는 "character design sheet" 키워드와 패널 레이아웃 지시에 잘 반응.
# 내부에 4~6개 뷰를 배치하도록 프롬프트에 명시.

template: |
  Type (유형): character design sheet, {sheet_type}.
  Character (캐릭터): {character_desc}.
  Art style (스타일): {art_style}.
  Layout (레이아웃): {layout}. All panels share consistent character identity — same proportions, same color palette, same costume. Panels separated by thin neutral dividers or clean whitespace.
  Color palette (팔레트): {palette}.
  Line & shading (선·음영): {line_style}.
  Background (배경): {background}. Never obscure the character silhouette.
  Reference (레퍼런스): production-quality model sheet used by animation studios (Studio Ghibli, Pixar, Trigger, Mappa), like a formal turnaround used by character supervisors.
  Negative (금지): no text labels, no watermark, no blurred faces, no inconsistent proportions across panels, no duplicated panels, no background distractions, no photoreal elements.

variables:
  sheet_type:
    - full turnaround (front, 3/4, side, back)
    - expression sheet (6 facial expressions in a grid)
    - costume variation sheet (3 outfits, same character, same pose)
    - pose sheet (6 dynamic poses in one frame)
    - proportions chart with head-count guide lines (drawn subtle)
  character_desc:
    - a mid-20s Korean woman, independent cafe owner, shoulder-length wavy brown hair, warm brown eyes, oversized beige cardigan over white tee, dark straight jeans, white sneakers
    - a teenage boy, Korean middle-schooler vibe, tousled black hair, round glasses, navy school jacket with hoodie underneath, curious expression
    - an elderly fisherman, weathered skin, silver short beard, dark canvas jacket, wool beanie, quiet seasoned expression
    - a young woman in futuristic utilitarian outfit — cropped tech jacket, cargo pants, undercut hairstyle with teal highlights
    - a cheerful barista, late-20s Korean man, short dark hair, denim apron over black tee, expressive smile
    - a fantasy half-elf ranger, slender build, dark green cloak, leather pauldrons, bow slung on back, braided long hair
    - a K-pop idol-esque performer in stage costume — sleek modern blazer, statement choker, charismatic stance
    - a cozy witch apprentice, short black dress with lace, wide-brim felt hat, striped stockings, loyal cat familiar
  art_style:
    - clean anime style, Studio Ghibli-inflected, thin confident outlines, flat cel shading, gentle film grain
    - semi-realistic painterly illustration, visible brushwork, gouache feel
    - 3D Pixar-style render baked onto flat sheet, soft subsurface skin
    - modern Korean webtoon style, bold outlines, clean flats with minimal gradient
    - retro 90s anime cel style, slightly saturated colors, visible paint edges
  layout:
    - vertical column of 4 character views separated by thin gray dividers, equal spacing
    - 2x2 grid with front-3/4-side-back labeled implicitly by pose only
    - horizontal strip of 6 expression portraits, chest-up, shared neutral gray backdrop
    - central hero pose with 3 secondary pose thumbnails arranged around it
  palette:
    - warm earth tones — terracotta, cream, ochre, forest green
    - muted cool tones — slate, rose, pale denim, ivory
    - high-contrast limited palette — black, white, red accent, warm gray
    - soft pastel — mint, butter, lavender, peach
  line_style:
    - even-weight 2px black outlines, flat cel shading, two-tone shadow per form
    - tapered ink-brush outlines with painterly shading underneath
    - no outlines, pure shape-based coloring, subtle rim light
    - heavy black outlines with halftone screen shading
  background:
    - seamless warm off-white model-sheet paper
    - faint grid lines suggesting proportion reference
    - simple flat pastel wash, one tone only
    - minimal dotted reference lines for turnaround alignment
