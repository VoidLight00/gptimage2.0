category: crm
label: CRM·멤버십 키비주얼
count: 25
prefix: B-CRM
out_dir: raw/batch/crm
size: "1024x1024"
quality: high

template: |
  Subject (피사체): {hero_object}.
  Context (촬영 맥락): {industry} CRM / lifecycle email hero image for the purpose of {purpose}. Commercial brand-photography quality, medium-format, 50mm lens, f/4, ISO 100.
  Composition (구도): {composition}. Primary subject occupies 35-50% of frame to leave intentional negative space. {copy_zone}.
  Lighting (라이팅): {lighting}.
  Color palette (팔레트): {palette}.
  Scene (환경): {scene}.
  Post (후보정): calm, premium brand tone, color-consistent with quiet-luxury e-mail templates, no aggressive contrast, no Instagram pop, no lens flare.
  Negative (금지): no text, no copy overlay, no placeholder lorem ipsum, no product logos, no cartoon illustrations, no obvious stock-photo cliche.

variables:
  hero_object:
    - a folded linen welcome card on a tray with a single sprig of eucalyptus
    - a hotel bedside table with a welcome tea set — cast-iron teapot, ceramic cup, two chocolates
    - an opened gift box with satin ribbon, tissue paper fanned slightly
    - a ceramic mug at a cafe counter with a paper loyalty card next to it
    - a boarding pass on a linen seat with soft window light and clouds outside
    - a minimal membership card with subtle embossed logo area, a fingertip hovering over it
    - a seasonal wreath leaning against a cream wall with card placeholder
    - an open journal with a pen and a gentle sunlit shadow crossing the page
  industry:
    - boutique hotel loyalty program
    - premium fashion e-commerce
    - clean-beauty D2C brand
    - specialty coffee app reward
    - travel OTA / airline miles
    - F&B delivery subscription
    - wellness studio membership
  purpose:
    - dormant customer reactivation
    - VIP pre-sale exclusive invite
    - birthday reward moment
    - repurchase reminder with gentle nudge
    - welcome onboarding series day-1
    - subscription renewal encouragement
    - anniversary milestone celebration
  composition:
    - lower-third subject placement with clean sky/wall above
    - left 2/3 scene, right 1/3 empty for copy column
    - top-down flat-lay with intentional central negative space
    - upper 1/3 subject, large bottom band for headline
  copy_zone:
    - top banner for email subject line
    - right column for CTA button
    - bottom pad for small-print legal
    - centered safe-zone for subject + one-line tagline
  lighting:
    - gentle morning window light
    - soft blue-hour ambient + warm interior lamp
    - overcast wrap-around daylight for even mood
    - single-source studio softbox from camera-left
  palette:
    - ivory, taupe, warm gold, sage
    - off-white, storm blue, brass, walnut
    - pale pink, linen cream, muted coral, matte black
    - forest green, kraft brown, antique white, copper
  scene:
    - a tidy studio apartment desk with morning sun
    - a warm boutique hotel room corner with low lamp
    - a minimal ivory backdrop for catalog-style hero
    - a rainy-day cafe interior with misted window
