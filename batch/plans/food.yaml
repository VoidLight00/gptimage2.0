category: food
label: F&B 광고사진
count: 25
prefix: B-FOOD
out_dir: raw/batch/food
size: "1024x1024"
quality: high

template: |
  Subject (피사체): {dish}. Textures hyper-real — steam wisps, glossy sauce, crisp edges, dewy herbs.
  Context (촬영 맥락): Commercial food photography for {usecase}. Shot on medium-format, 100mm macro lens, f/4.5, ISO 200, tripod-locked.
  Composition (구도): {composition}. {copy_zone}.
  Lighting (라이팅): {lighting}. Controlled specular on sauce, no blown highlights, careful shadow transitions.
  Color palette (팔레트): {palette}.
  Surface & styling (테이블·스타일링): {surface}. {styling}.
  Post (후보정): color-accurate commercial retouching, warm neutral grade, no yellow cast, no instagram filter, no over-saturation of reds, preserve natural grain of ingredients.
  Negative (금지): no text, no menu overlay, no packaging mockup, no brand logos, no plastic-looking fake food, no extreme fisheye, no overcrowded frame, no unclean plate edges.

variables:
  dish:
    - tteokbokki with melted mozzarella stretching mid-pull, crispy tempura tower on the side
    - Korean seolleongtang in a traditional stone bowl, clear broth, scallion garnish, kkakdugi radish kimchi
    - fresh-baked croissant with visible flaky layers next to iced americano in a clear glass
    - bibim naengmyeon with glossy sauce, half boiled egg, pear slices, sesame dusting
    - hanu sirloin steak medium-rare, grill marks visible, rosemary, flaky salt
    - cheese-pull Korean fried chicken, soy-garlic glaze, pickled radish cubes
    - brunch plate — ricotta pancakes, maple syrup drip, berries, dusted sugar
    - latte art rosetta in a white ceramic cup on a wood counter, ground beans scattered
    - gejang rice bowl with roe yolks breaking over warm rice
    - bingsu tower — condensed milk pour, sliced strawberries, matcha dust
  usecase:
    - food delivery app performance ad
    - brunch cafe Instagram feed
    - hotel all-day-dining weekend CRM email
    - franchise new-menu launch key visual
    - premium restaurant printed menu hero shot
  composition:
    - 45-degree hero angle, subject dominates lower 60%
    - top-down flat-lay, generous negative space around plate
    - extreme macro close-up of steam rising or sauce dripping
    - eye-level with shallow depth, background melted to bokeh
  copy_zone:
    - upper 30% empty for headline
    - right 40% reserved for price/tagline column
    - bottom 25% reserved for CTA button space
    - diagonal top-left corner reserved for logo
  lighting:
    - soft window light from camera-left, silver bounce fill right, slight haze backlight
    - single hard top-rim light to emphasize steam, matte fill below
    - warm tungsten 2800K ambient with neutral 5500K key for appetite colors
    - overcast-diffused even illumination, commercial catalog style
  palette:
    - warm caramel, charred crust, emerald herb, cream linen
    - glossy red glaze, gold amber, scallion green, matte black
    - dairy cream, strawberry, mint leaf, sugar white
    - iced blue, roasted bean brown, oat cream, walnut wood
  surface:
    - rough oak cutting board with linen runner
    - pristine white ceramic plate on grey marble
    - rustic ttukbaegi or cast-iron pan on dark wooden table
    - matte black slate with a hint of flour dust
  styling:
    - propwork minimal — one small side dish and a linen napkin only
    - dynamic action frame — hand in frame holding chopsticks mid-bite
    - vertical garnish stack for height and scale
    - clean editorial styling with one sauce splatter on purpose
