category: travel
label: 여행·호텔 키비주얼
count: 25
prefix: B-TRAVEL
out_dir: raw/batch/travel
size: "1024x1024"
quality: high

template: |
  Subject (피사체): {scene}.
  Context (촬영 맥락): Luxury hospitality / travel editorial photography, commissioned for premium hotel or OTA campaign. Medium-format digital, 35mm or 50mm lens, f/5.6, ISO 200, shot handheld with subtle natural micro-motion.
  Composition (구도): {composition}. Leading lines emphasize place, human presence is implied not explicit. {copy_zone}.
  Lighting (라이팅): {lighting}.
  Color palette (팔레트): {palette}.
  Atmosphere (분위기): {mood}. Sensory details — air temperature, scent, texture of wood/stone/linen implied.
  Post (후보정): natural film-like contrast, restrained shadow lift, Kodak Portra 400 emulation, no Instagram filters, no artificial bloom.
  Negative (금지): no text, no logos, no watermarks, no crowds of people, no duplicated windows, no fake-looking CGI surfaces, no over-HDR, no neon oversaturation.

variables:
  scene:
    - ocean-view hotel suite interior with floor-to-ceiling window framing turquoise Jeju water
    - private hanok stay courtyard with stone walls, persimmon tree, morning mist
    - rooftop infinity pool at golden hour facing Busan Haeundae skyline
    - Gangneung Anmok beach cafe terrace with a single coffee cup and open book
    - narrow Tokyo backstreet izakaya entrance with red lanterns and wet stone pavement at dusk
    - Chiang Mai old-town temple spire in first morning light, low mist
    - Bali Ubud rice terrace viewed from infinity pool edge at dawn
    - Jeju stone-wall path with tangerine trees and a single cyclist silhouette
    - Seoul hanok-style boutique hotel tea lounge with cast iron teapot and yuja
    - Okinawa seaside villa deck with plunge pool at blue hour
  composition:
    - interior vantage looking outward through large window, strong diagonal natural light
    - low-angle architectural hero shot with sky 2/3 of frame
    - top-down flat-lay of travel essentials — passport, camera, linen, coffee — subtle brand-ready negative space
    - wide-angle landscape with horizon line on lower third, foreground object anchors
    - over-the-shoulder POV walking into the scene
  copy_zone:
    - upper 30% sky/wall negative space reserved for headline
    - left column vertical negative space for logo stack
    - bottom 25% reserved for tagline and CTA
    - diagonal corner negative space (upper-right) for stamp-style copy
  lighting:
    - early golden-hour, long shadows, warm CTO gel tint
    - overcast soft skylight, even wrap-around illumination
    - blue hour with practical interior lamps glowing
    - midday clear sky with strong directional sun, controlled specular highlights
  palette:
    - pacific teal, sandstone, linen white, weathered cedar
    - persimmon orange, hanji cream, ink gray, bamboo green
    - neon pink-purple sunset, midnight navy, cold aluminum
    - terracotta, olive, sun-bleached oak, dusty blue
  mood:
    - contemplative solo travel, slow morning ritual
    - understated luxury couple retreat, whispered intimacy
    - active weekend with close friends, lively yet tasteful
    - milestone anniversary stay, cinematic refined elegance
